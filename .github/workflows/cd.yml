name: CD - Docker Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------
  # 1) Build da imagem Docker e push para o GitHub Container Registry
  # -------------------------------------------------------
  docker:
    name: Build & Push imagem Docker
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------
  # 2) Deploy STAGING: sobe docker-compose dentro do runner e faz smoke test
  # -------------------------------------------------------
  deploy-staging:
    name: Deploy STAGING
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: http://localhost:8080
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR (para pull da imagem)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar .env de staging
        run: |
          cp .env.example .env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=staging-${{ github.sha }}|" .env
          echo "APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> .env

      - name: Subir stack STAGING
        run: docker compose -f docker-compose.staging.yml --env-file .env up -d

      - name: Aguardar healthcheck
        run: |
          for i in {1..30}; do
            status=$(curl -fsS http://localhost:8080/actuator/health 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$status" ]; then
              echo "STAGING UP"; exit 0
            fi
            echo "Aguardando app subir... ($i/30)"
            sleep 5
          done
          echo "STAGING nao ficou saudavel"
          docker compose -f docker-compose.staging.yml logs app
          exit 1

      - name: Smoke test - endpoint publico
        run: curl -fsS http://localhost:8080/actuator/health

      - name: Smoke test - endpoint protegido deve exigir auth
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/colaboradores)
          echo "HTTP $code"
          [ "$code" = "403" ] || [ "$code" = "401" ]

      - name: Logs (sempre)
        if: always()
        run: docker compose -f docker-compose.staging.yml logs --tail=80

      - name: Derrubar stack
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v

  # -------------------------------------------------------
  # 3) Deploy PRODUCAO: exige aprovacao manual via GitHub Environments
  # -------------------------------------------------------
  deploy-prod:
    name: Deploy PRODUCAO
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: http://localhost:8090
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preparar .env de producao
        run: |
          cp .env.example .env.prod
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.PROD_JWT_SECRET || 'prod-fallback-change-me' }}|" .env.prod
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD || 'prod-db-change-me' }}|" .env.prod
          sed -i "s|^HOST_APP_PORT=.*|HOST_APP_PORT=8090|" .env.prod
          sed -i "s|^HOST_DB_PORT=.*|HOST_DB_PORT=5433|" .env.prod
          echo "APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)" >> .env.prod

      - name: Subir stack PRODUCAO
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

      - name: Aguardar healthcheck
        run: |
          for i in {1..30}; do
            status=$(curl -fsS http://localhost:8090/actuator/health 2>/dev/null | grep -o '"status":"UP"' || true)
            if [ -n "$status" ]; then
              echo "PROD UP"; exit 0
            fi
            echo "Aguardando app subir... ($i/30)"
            sleep 5
          done
          echo "PROD nao ficou saudavel"
          docker compose -f docker-compose.prod.yml logs app
          exit 1

      - name: Smoke test
        run: curl -fsS http://localhost:8090/actuator/health

      - name: Logs (sempre)
        if: always()
        run: docker compose -f docker-compose.prod.yml logs --tail=80

      - name: Derrubar stack
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
