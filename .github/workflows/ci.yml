name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build + Testes (JUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin) + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permissao ao mvnw
        run: chmod +x mvnw

      - name: Rodar testes (perfil H2 in-memory)
        run: ./mvnw -B -ntp -Dspring.profiles.active=test test

      - name: Publicar relatorios de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

  package:
    name: Empacotar JAR
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - run: chmod +x mvnw

      - name: Gerar JAR (skip tests)
        run: ./mvnw -B -ntp -DskipTests package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: esg-restful-jar
          path: target/esg-restful.jar
          if-no-files-found: error
