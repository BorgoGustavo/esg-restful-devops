spring.application.name=esg-restful

# --------------------------------------------------------------------------
# Perfil default -> Oracle FIAP (usado apenas em desenvolvimento na faculdade)
# Os ambientes Docker (staging/prod) usam o perfil "docker" -> Postgres
# CI usa o perfil "test" -> H2 em memoria
# --------------------------------------------------------------------------

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
spring.datasource.username=${DB_USER:rm560492}
spring.datasource.password=${DB_PASSWORD:291001}

spring.jpa.show-sql=true

# Usuario/senha padrao do Spring Security (ambiente local de desenvolvimento)
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASSWORD:admin}

# Detalhamento de erros
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-binding-errors=always

# Flyway (default aponta para scripts Oracle)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration/oracle}

# Chave secreta JWT
minha.chave.secreta=${JWT_SECRET:projeto-esg}

# Actuator: expor apenas endpoints usados pelos healthchecks do Docker/CI
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
