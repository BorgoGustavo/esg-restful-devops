# --------------------------------------------------------------------------
# Perfil "docker": usado pelos ambientes staging e producao (docker-compose)
# Banco: PostgreSQL 16 em container
# --------------------------------------------------------------------------

spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:esg}
spring.datasource.username=${DB_USER:esg}
spring.datasource.password=${DB_PASSWORD:esg}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/postgresql

server.port=${APP_PORT:8080}

# Security fica no modo padrao Spring (auth via JWT emitido em /auth/login)
# Variaveis sensiveis vem do docker-compose / .env
minha.chave.secreta=${JWT_SECRET:troque-este-segredo}

# Actuator disponivel para healthcheck do docker/ci
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
