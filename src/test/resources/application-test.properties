# --------------------------------------------------------------------------
# Perfil "test": usado APENAS pelos testes automatizados do CI
# Banco: H2 em memoria. Flyway desabilitado (Hibernate cria o schema).
# --------------------------------------------------------------------------

spring.datasource.url=jdbc:h2:mem:esg_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

minha.chave.secreta=test-secret-key

management.endpoints.web.exposure.include=health,info
